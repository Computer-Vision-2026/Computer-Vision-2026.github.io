name: Auto Assign

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]

permissions:
  issues: write
  pull-requests: write

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Assign pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTO_ASSIGN_TOKEN || github.token }}
          script: |
            const assignees = ['nihermann'];
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            core.info(`Setting assignees for PR ${issue_number}: ${JSON.stringify(assignees)}`);

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees,
            });
